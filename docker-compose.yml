version: '3.5'

services:
  api1:
    build: .
    hostname: api1
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://rinha:rinha@db:5432/rinha?sslmode=disable
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: '0.3GB'

  api2:
    build: .
    hostname: api2
    depends_on:
      db:
        condition: service_healthy
    environment:
      - PORT=8080
      - DATABASE_URL=postgres://rinha:rinha@db:5432/rinha?sslmode=disable
    expose:
      - "8080"
    deploy:
      resources:
        limits:
          cpus: '0.20'
          memory: '0.3GB'

  nginx:
    image: nginx:latest
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api1
      - api2
    ports:
      - "9999:9999"
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: '0.2GB'

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=rinha
      - POSTGRES_PASSWORD=rinha
      - POSTGRES_DB=rinha
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    command: >
      postgres
        -c shared_buffers=512MB
        -c work_mem=64MB
        -c max_connections=200
        -c synchronous_commit=off
        -c checkpoint_completion_target=0.9
        -c effective_cache_size=1GB
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rinha"]
      interval: 2s
      timeout: 5s
      retries: 15
    deploy:
      resources:
        limits:
          cpus: '1.00'
          memory: '2.2GB'
